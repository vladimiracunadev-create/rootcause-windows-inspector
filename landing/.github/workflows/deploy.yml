# ── Deploy RootCause Landing Page → GitHub Pages ───────────────────────────
#
# INSTRUCCIONES:
#   1. Crea un repo PÚBLICO en GitHub (ej: "rootcause-landing")
#   2. Copia el contenido de la carpeta landing/ a la raíz de ese repo
#   3. Coloca este archivo en .github/workflows/deploy.yml del repo público
#   4. En Settings → Pages → Source: selecciona "GitHub Actions"
#   5. Cada push a main desplegará automáticamente la landing
#
name: Deploy Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el repositorio raíz como la landing
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
