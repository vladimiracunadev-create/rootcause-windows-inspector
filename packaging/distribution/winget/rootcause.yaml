  - windows
  - procesos
  - rendimiento
  - forense
  - monitor
  - cli
  - rust
Installers:
  - Architecture: x64
    InstallerType: inno
    InstallerUrl: https://github.com/vladimiracunadev-create/rootcause-windows-inspector/releases/latest/download/RootCause-Setup.exe
    InstallerSha256: UPDATE_SHA256_ON_RELEASE
    InstallerSwitches:
      Silent: /SILENT
      SilentWithProgress: /SP-
    ProductCode: RootCauseWindowsInspector
ManifestType: singleton
ManifestVersion: "1.4.0"
