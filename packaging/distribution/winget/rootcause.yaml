License: Apache-2.0
LicenseUrl: https://www.apache.org/licenses/LICENSE-2.0
Copyright: "Copyright 2025 Vladimir Acuña"
ShortDescription: Monitor forense ligero para Windows
Description: >
  RootCause Windows Inspector detecta la causa raíz de lentitud en Windows:
  procesos dominantes, archivos temporales, conexiones sospechosas, servicios
