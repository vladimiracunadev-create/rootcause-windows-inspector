# Comando de instalación: winget install VladimirAcuna.RootCause

PackageIdentifier: VladimirAcuna.RootCause
PackageVersion: "0.12.0"
PackageLocale: es-ES
Publisher: Vladimir Acuña
PublisherUrl: https://github.com/vladimiracunadev-create
PublisherSupportUrl: https://github.com/vladimiracunadev-create/rootcause-windows-inspector/issues
PackageName: RootCause Windows Inspector
