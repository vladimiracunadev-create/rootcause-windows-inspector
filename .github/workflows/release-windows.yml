name: release-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: compilar-empaquetar-publicar
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust estable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Generar Cargo.lock si aún no existe
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) {
            cargo generate-lockfile
          }

      - name: Quality gates + build release
        shell: pwsh
        run: .\scripts\quality-gates.ps1

      - name: Empaquetar ZIP portable
        shell: pwsh
        run: .\scripts\package-portable.ps1

      - name: Instalar Inno Setup via Chocolatey
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Compilar instalador
        shell: pwsh
        run: .\scripts\package-inno.ps1

      - name: Generar hashes SHA-256
        shell: pwsh
        run: .\scripts\hash-artifacts.ps1

      - name: Verificar artefactos generados
        shell: pwsh
        run: |
          $required = @(
            'build\RootCause-Portable.zip',
            'build\installer\RootCause-Setup.exe',
            'build\SHA256SUMS.txt'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Error "Artefacto faltante: $path"
              exit 1
            }
            $size = (Get-Item $path).Length / 1MB
            Write-Host "OK  $path  ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
          }

      - name: Subir artefactos al workflow (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: rootcause-release-${{ github.run_number }}
          path: |
            build/RootCause-Portable.zip
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publicar GitHub Release en repo privado (solo en tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: RootCause ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## RootCause — Windows Inspector ${{ github.ref_name }}

            Software de diagnóstico para Windows escrito en Rust.
            Detecta procesos problemáticos, archivos temporales, conexiones sospechosas y actividad de actualización en segundo plano.

            ---

            ## Qué hay en este release

            | Archivo | Descripción |
            |---|---|
            | `RootCause-Portable.zip` | Versión portable — extraer y ejecutar, sin instalación |
            | `RootCause-Setup.exe` | Instalador Inno Setup — instala en `Program Files` con acceso directo |
            | `SHA256SUMS.txt` | Hashes SHA-256 para verificar integridad antes de ejecutar |

            ---

            ## Instalación rápida

            ### Opción A — Portable (recomendado para pruebas)
            1. Descarga `RootCause-Portable.zip`
            2. Verifica el hash (ver abajo)
            3. Extrae en cualquier carpeta
            4. Ejecuta `rootcause.exe` como administrador

            ### Opción B — Instalador
            1. Descarga `RootCause-Setup.exe`
            2. Verifica el hash (ver abajo)
            3. Ejecuta el instalador y sigue los pasos
            4. Abre RootCause desde el acceso directo en el escritorio o menú inicio

            ---

            ## Verificar integridad antes de ejecutar

            ```powershell
            Get-FileHash .\RootCause-Portable.zip -Algorithm SHA256
            Get-FileHash .\RootCause-Setup.exe   -Algorithm SHA256
            # Compara con el contenido de SHA256SUMS.txt
            ```

            ---

            ## Requisitos mínimos

            - Windows 10 o Windows 11 (64-bit)
            - Algunas funciones requieren privilegios de administrador
            - Para el **modo de precisión ETW/WPR**: instalar [Windows Performance Toolkit](https://learn.microsoft.com/en-us/windows-hardware/test/wpt/)

            ---

            ## ⚠ Nota de seguridad

            Este binario **no tiene firma digital** en esta versión.
            Windows puede mostrar una advertencia de SmartScreen — es esperado.

          files: |
            build/RootCause-Portable.zip
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt

      # ── Publicar copia pública en rootcause-landing ──────────────────────────────
      # Requiere un PAT (Personal Access Token) con scope "repo" para rootcause-landing,
      # guardado como secreto LANDING_RELEASE_TOKEN en la configuración de ESTE repo privado.
      # Ver docs/CI_GITHUB.md sección "Configurar LANDING_RELEASE_TOKEN".
      - name: Publicar release público en rootcause-landing
        if: github.ref_type == 'tag' && env.LANDING_TOKEN_AVAILABLE == 'true'
        env:
          GH_TOKEN: ${{ secrets.LANDING_RELEASE_TOKEN }}
          LANDING_TOKEN_AVAILABLE: ${{ secrets.LANDING_RELEASE_TOKEN != '' }}
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $title   = "RootCause Windows Inspector $tag"
          $notes   = @"
          ## RootCause Windows Inspector $tag

          Monitor forense ligero para Windows. Detecta qué proceso, servicio o conexión está degradando tu equipo.

          ---

          ## Archivos en este release

          | Archivo | Qué es |
          |---|---|
          | ``RootCause-Portable.zip`` | Versión portable — extraer y ejecutar, sin instalador |
          | ``RootCause-Setup.exe`` | Instalador Windows — agrega rootcause al PATH |
          | ``SHA256SUMS.txt`` | Hashes SHA-256 para verificar integridad |

          ---

          ## Instalación rápida

          **Portable:**
          1. Descarga ``RootCause-Portable.zip``
          2. Extrae en cualquier carpeta
          3. Ejecuta ``rootcause.exe`` (administrador recomendado)
          4. O desde consola: ``rootcause --help``

          **Instalador:**
          1. Descarga ``RootCause-Setup.exe``
          2. Ejecuta y sigue los pasos
          3. ``rootcause`` queda disponible en el PATH del sistema

          ---

          ## Requisitos

          - Windows 10 / 11 x64
          - Administrador para algunas funciones (bloquear IP, detener servicios)
          - [Windows Performance Toolkit](https://learn.microsoft.com/en-us/windows-hardware/test/wpt/) para modo ETW/WPR

          ---

          ## Verificar integridad

          ```powershell
          Get-FileHash .\RootCause-Portable.zip -Algorithm SHA256
          Get-FileHash .\RootCause-Setup.exe   -Algorithm SHA256
          ```

          Compara con ``SHA256SUMS.txt``.

          ---

          🌐 Landing: https://vladimiracunadev-create.github.io/rootcause-landing/
          "@

          $prerelease = if ("$tag" -match '-') { "--prerelease" } else { "" }

          gh release create $tag `
            --repo "vladimiracunadev-create/rootcause-landing" `
            --title $title `
            --notes $notes `
            $prerelease `
            "build/RootCause-Portable.zip" `
            "build/installer/RootCause-Setup.exe" `
            "build/SHA256SUMS.txt"
