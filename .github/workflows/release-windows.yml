name: release-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: compilar-empaquetar-publicar
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust estable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Generar Cargo.lock si aún no existe
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) {
            cargo generate-lockfile
          }

      - name: Quality gates + build release
        shell: pwsh
        run: .\scripts\quality-gates.ps1

      - name: Empaquetar ZIP portable
        shell: pwsh
        run: .\scripts\package-portable.ps1

      - name: Instalar Inno Setup via Chocolatey
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Compilar instalador
        shell: pwsh
        run: .\scripts\package-inno.ps1

      - name: Generar hashes SHA-256
        shell: pwsh
        run: .\scripts\hash-artifacts.ps1

      - name: Verificar artefactos generados
        shell: pwsh
        run: |
          $required = @(
            'build\RootCause-Portable.zip',
            'build\installer\RootCause-Setup.exe',
            'build\SHA256SUMS.txt'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Error "Artefacto faltante: $path"
              exit 1
            }
            $size = (Get-Item $path).Length / 1MB
            Write-Host "OK  $path  ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
          }

      - name: Subir artefactos al workflow (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: rootcause-release-${{ github.run_number }}
          path: |
            build/RootCause-Portable.zip
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publicar GitHub Release (solo en tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: RootCause ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## RootCause — Windows Inspector ${{ github.ref_name }}

            Software de diagnóstico para Windows escrito en Rust.
            Detecta procesos problemáticos, archivos temporales, conexiones sospechosas y actividad de actualización en segundo plano.

            ---

            ## Qué hay en este release

            | Archivo | Descripción |
            |---|---|
            | `RootCause-Portable.zip` | Versión portable — extraer y ejecutar, sin instalación |
            | `RootCause-Setup.exe` | Instalador Inno Setup — instala en `Program Files` con acceso directo |
            | `SHA256SUMS.txt` | Hashes SHA-256 para verificar integridad antes de ejecutar |

            ---

            ## Instalación rápida

            ### Opción A — Portable (recomendado para pruebas)
            1. Descarga `RootCause-Portable.zip`
            2. Verifica el hash (ver abajo)
            3. Extrae en cualquier carpeta
            4. Ejecuta `rootcause.exe` como administrador

            ### Opción B — Instalador
            1. Descarga `RootCause-Setup.exe`
            2. Verifica el hash (ver abajo)
            3. Ejecuta el instalador y sigue los pasos
            4. Abre RootCause desde el acceso directo en el escritorio o menú inicio

            ---

            ## Verificar integridad antes de ejecutar

            ```powershell
            # Descarga SHA256SUMS.txt en la misma carpeta que los archivos
            # Luego verifica cada uno:
            Get-FileHash .\RootCause-Portable.zip -Algorithm SHA256
            Get-FileHash .\RootCause-Setup.exe   -Algorithm SHA256
            # Compara con el contenido de SHA256SUMS.txt
            ```

            ---

            ## Requisitos mínimos

            - Windows 10 o Windows 11 (64-bit)
            - Algunas funciones requieren privilegios de administrador
            - Para el **modo de precisión ETW/WPR**: instalar [Windows Performance Toolkit](https://learn.microsoft.com/en-us/windows-hardware/test/wpt/)

            ---

            ## Funciones principales en esta versión

            - Vista de procesos con puntuación de riesgo (CPU, RAM, disco, ruta)
            - Escaneo de carpetas temporales (`%TEMP%`, `Windows\Temp`, SoftwareDistribution)
            - Análisis de conexiones de red activas con clasificación de IPs públicas
            - Eventos del sistema (advertencias y errores recientes)
            - Estado de servicios clave de Windows Update y mantenimiento
            - **Modo de precisión**: captura ETW/WPR, exportación y resumen automático de ETL
            - Exportación de snapshot completo a JSON
            - Acciones controladas: finalizar proceso, bloquear IP, detener servicio

            ---

            ## ⚠ Nota de seguridad

            Este binario **no tiene firma digital** en esta versión.
            Windows puede mostrar una advertencia de SmartScreen — es esperado.
            Para mayor confianza, compila desde el código fuente: ver [`docs/BUILD_WINDOWS.md`](https://github.com/vladimiracunadev-create/rootcause-windows-inspector/blob/master/docs/BUILD_WINDOWS.md)

            ---

            ## Documentación

            - [Manual de uso](https://github.com/vladimiracunadev-create/rootcause-windows-inspector/blob/master/docs/OPERACION.md)
            - [Guía de build desde código fuente](https://github.com/vladimiracunadev-create/rootcause-windows-inspector/blob/master/docs/BUILD_WINDOWS.md)
            - [Modo de precisión ETW/WPR](https://github.com/vladimiracunadev-create/rootcause-windows-inspector/blob/master/docs/PRECISION_MODE_ETW.md)
            - [Solución de problemas](https://github.com/vladimiracunadev-create/rootcause-windows-inspector/blob/master/docs/TROUBLESHOOTING.md)
          files: |
            build/RootCause-Portable.zip
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt
