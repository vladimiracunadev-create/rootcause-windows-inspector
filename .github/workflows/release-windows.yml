name: release-windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  LANDING_TOKEN_AVAILABLE: ${{ secrets.LANDING_RELEASE_TOKEN != '' }}

jobs:
  release:
    name: compilar-empaquetar-publicar
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust estable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Generar Cargo.lock si aun no existe
        shell: pwsh
        run: |
          if (-not (Test-Path Cargo.lock)) {
            cargo generate-lockfile
          }

      - name: Quality gates + build release
        shell: pwsh
        run: .\scripts\quality-gates.ps1

      - name: Empaquetar ZIP portable
        shell: pwsh
        run: .\scripts\package-portable.ps1

      - name: Instalar Inno Setup via Chocolatey
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Compilar instalador
        shell: pwsh
        run: .\scripts\package-inno.ps1

      - name: Compilar edicion CLI-only
        shell: pwsh
        run: cargo build --release --no-default-features --target-dir target/cli

      - name: Empaquetar ZIP CLI-only
        shell: pwsh
        run: .\scripts\package-cli-portable.ps1

      - name: Publicar modulo PowerShell
        shell: pwsh
        run: .\scripts\package-powershell-module.ps1

      - name: Instalar Node.js para extension VS Code
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Empaquetar extension VS Code
        shell: pwsh
        run: .\scripts\package-vscode-extension.ps1

      - name: Generar hashes SHA-256
        shell: pwsh
        run: .\scripts\hash-artifacts.ps1

      - name: Verificar artefactos generados
        shell: pwsh
        run: |
          $required = @(
            'build\RootCause-Portable.zip',
            'build\RootCause-CLI-Portable.zip',
            'build\RootCause.psm1',
            'build\RootCause-VSCode-Extension.vsix',
            'build\installer\RootCause-Setup.exe',
            'build\SHA256SUMS.txt'
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              Write-Error "Artefacto faltante: $path"
              exit 1
            }
            $size = (Get-Item $path).Length / 1MB
            Write-Host "OK  $path  ($([math]::Round($size, 2)) MB)" -ForegroundColor Green
          }

      - name: Subir artefactos al workflow (siempre)
        uses: actions/upload-artifact@v4
        with:
          name: rootcause-release-${{ github.run_number }}
          path: |
            build/RootCause-Portable.zip
            build/RootCause-CLI-Portable.zip
            build/RootCause.psm1
            build/RootCause-VSCode-Extension.vsix
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publicar GitHub Release en repo privado (solo en tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: RootCause ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## RootCause - Windows Inspector ${{ github.ref_name }}

            Software de diagnostico para Windows escrito en Rust.
            Detecta procesos problematicos, archivos temporales, conexiones sospechosas y actividad de actualizacion en segundo plano.

            ---

            ## Que hay en este release

            | Archivo | Descripcion |
            |---|---|
            | `RootCause-Setup.exe` | Instalador principal GUI + CLI |
            | `RootCause-Portable.zip` | Version portable del build principal GUI + CLI |
            | `RootCause-CLI-Portable.zip` | Version portable CLI-only (~4 MB, sin GUI) |
            | `RootCause.psm1` | Modulo PowerShell (requiere `rootcause.exe`) |
            | `RootCause-VSCode-Extension.vsix` | Extension VS Code (requiere `rootcause.exe`) |
            | `SHA256SUMS.txt` | Hashes SHA-256 para verificar integridad antes de ejecutar |

            ---

            ## Instalacion rapida

            ### Opcion A - Instalador (recomendado para la mayoria)
            1. Descarga `RootCause-Setup.exe`
            2. Verifica el hash (ver abajo)
            3. Ejecuta el instalador y sigue los pasos
            4. Abre RootCause desde el acceso directo o usa `rootcause` desde consola

            ### Opcion B - Portable GUI
            1. Descarga `RootCause-Portable.zip`
            2. Verifica el hash (ver abajo)
            3. Extrae en cualquier carpeta
            4. Ejecuta `rootcause.exe` como administrador

            ### Opcion C - CLI-only / integraciones
            - `RootCause-CLI-Portable.zip`: scripts, Server Core, CI
            - `RootCause.psm1`: integracion PowerShell; requiere `rootcause.exe`
            - `RootCause-VSCode-Extension.vsix`: integracion VS Code; requiere `rootcause.exe`

            ---

            ## Verificar integridad antes de ejecutar

            ```powershell
            Get-FileHash .\RootCause-Portable.zip -Algorithm SHA256
            Get-FileHash .\RootCause-CLI-Portable.zip -Algorithm SHA256
            Get-FileHash .\RootCause-Setup.exe   -Algorithm SHA256
            Get-FileHash .\RootCause.psm1        -Algorithm SHA256
            Get-FileHash .\RootCause-VSCode-Extension.vsix -Algorithm SHA256
            # Compara con el contenido de SHA256SUMS.txt
            ```

            ---

            ## Requisitos minimos

            - Windows 10 o Windows 11 (64-bit)
            - Algunas funciones requieren privilegios de administrador
            - Para el **modo de precision ETW/WPR**: instalar [Windows Performance Toolkit](https://learn.microsoft.com/en-us/windows-hardware/test/wpt/)

            ---

            ## Nota de seguridad

            Este binario **no tiene firma digital** en esta version.
            Windows puede mostrar una advertencia de SmartScreen; es esperado.

          files: |
            build/RootCause-Portable.zip
            build/RootCause-CLI-Portable.zip
            build/RootCause.psm1
            build/RootCause-VSCode-Extension.vsix
            build/installer/RootCause-Setup.exe
            build/SHA256SUMS.txt

      # Publicar copia publica en rootcause-landing
      # Requiere un PAT con scope "repo" para rootcause-landing,
      # guardado como secreto LANDING_RELEASE_TOKEN en este repo privado.
      # Ver docs/CI_GITHUB.md seccion "Configurar LANDING_RELEASE_TOKEN".
      - name: Publicar release publico en rootcause-landing
        if: github.ref_type == 'tag' && env.LANDING_TOKEN_AVAILABLE == 'true'
        env:
          GH_TOKEN: ${{ secrets.LANDING_RELEASE_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $title = "RootCause Windows Inspector $tag"
          $notes = @"
          ## RootCause Windows Inspector $tag

          Monitor forense ligero para Windows. Detecta que proceso, servicio o conexion esta degradando tu equipo.

          ---

          ## Archivos en este release

          | Archivo | Que es |
          |---|---|
          | ``RootCause-Setup.exe`` | Instalador principal GUI + CLI |
          | ``RootCause-Portable.zip`` | Portable del build principal GUI + CLI |
          | ``RootCause-CLI-Portable.zip`` | Portable CLI-only (~4 MB) |
          | ``RootCause.psm1`` | Modulo PowerShell (requiere ``rootcause.exe``) |
          | ``RootCause-VSCode-Extension.vsix`` | Extension VS Code (requiere ``rootcause.exe``) |
          | ``SHA256SUMS.txt`` | Hashes SHA-256 para verificar integridad |

          ---

          ## Instalacion rapida

          **Instalador:**
          1. Descarga ``RootCause-Setup.exe``
          2. Ejecuta y sigue los pasos
          3. ``rootcause`` queda disponible en el PATH del sistema

          **Portable GUI:**
          1. Descarga ``RootCause-Portable.zip``
          2. Extrae en cualquier carpeta
          3. Ejecuta ``rootcause.exe`` (administrador recomendado)
          4. O desde consola: ``rootcause --help``

          **Integraciones y modo CLI-only:**
          - ``RootCause-CLI-Portable.zip`` para Server Core, scripts y CI
          - ``RootCause.psm1`` para automatizacion PowerShell
          - ``RootCause-VSCode-Extension.vsix`` para usar RootCause desde VS Code

          ---

          ## Requisitos

          - Windows 10 / 11 x64
          - Administrador para algunas funciones (bloquear IP, detener servicios)
          - [Windows Performance Toolkit](https://learn.microsoft.com/en-us/windows-hardware/test/wpt/) para modo ETW/WPR

          ---

          ## Verificar integridad

          ```powershell
          Get-FileHash .\RootCause-Portable.zip -Algorithm SHA256
          Get-FileHash .\RootCause-CLI-Portable.zip -Algorithm SHA256
          Get-FileHash .\RootCause-Setup.exe   -Algorithm SHA256
          Get-FileHash .\RootCause.psm1        -Algorithm SHA256
          Get-FileHash .\RootCause-VSCode-Extension.vsix -Algorithm SHA256
          ```

          Compara con ``SHA256SUMS.txt``.

          ---

          Landing: https://vladimiracunadev-create.github.io/rootcause-landing/
          "@

          $args = @(
            'release',
            'create',
            $tag,
            '--repo',
            'vladimiracunadev-create/rootcause-landing',
            '--title',
            $title,
            '--notes',
            $notes
          )

          if ($tag -match '-') {
            $args += '--prerelease'
          }

          $args += @(
            'build/RootCause-Portable.zip',
            'build/RootCause-CLI-Portable.zip',
            'build/RootCause.psm1',
            'build/RootCause-VSCode-Extension.vsix',
            'build/installer/RootCause-Setup.exe',
            'build/SHA256SUMS.txt'
          )

          & gh @args
